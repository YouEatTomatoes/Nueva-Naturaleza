<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-image: linear-gradient(to top right, rgb(108, 31, 0), rgb(21, 107, 21));
            background-attachment: fixed;
            justify-content: center;
            flex-direction: column;
            position: relative;
            display: flex;
        }
        #gameframe {
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            flex-direction: column;
            max-width: 97dvh;
        }
    </style>
</head>
<body>
    <div id="gameframe">
        <canvas id="game" width="100" height="100" style="border:2px solid #000000;"></canvas>
    </div>
    <script src="./gameplay.js"></script>
</body>
</html>
